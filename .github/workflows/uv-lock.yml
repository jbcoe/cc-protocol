name: Check uv lockfile

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
      - uv.lock
  pull_request:
    branches: [main]
    paths:
      - pyproject.toml
      - uv.lock

env:
  UV_FROZEN: 1

jobs:
  check-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Check uv lockfile is up to date
        run: uv lock --check
